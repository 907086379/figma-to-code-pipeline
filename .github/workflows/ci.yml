name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "16.20.2"
          cache: npm
      - name: Install
        run: npm ci || npm install
      - name: Tests (verify + smoke)
        run: npm test
      - name: Figma cache validate
        run: npm run fc:validate
      - name: Figma cache config
        run: npm run fc:config
